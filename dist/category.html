    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            background-color: hsl(var(--background));
            color-scheme: light;
        }
        body {
            font-family: var(--font-sans);
            min-height: 100dvh;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            -webkit-font-smoothing: antialiased;
        }
        :root {
            --radius-pill: 999px;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --container-max: 1320px;
            /* Fixed header; hero search uses --search-tuck on #hero-search-shell for size + transform. */
            --topbar-height: 64px;
            /* At tuck=1: translateY pulls bar from below header into header band (sticky top must stay fixed). */
            --hero-search-sticky-lift: 48px;
            /* Vertical breathing when #topbar-search-slot is used (empty = hidden). */
            --topbar-search-slot-pad-y: 4px;
            /* Inherited by #hero-search-bar for tuck math everywhere (including when reparented into header). */
            --search-tuck: 0;
            --header-height: var(--topbar-height);
            --page-bg-top: #e4f0f6;
            --page-bg-bottom: #e4f0f6;
            --qlist-section: #e4f0f6;
            --shadow-depth: 0 1px 2px 0 rgb(10 15 30 / 0.06);
            --shadow-depth-md: 0 4px 12px -2px rgb(10 15 30 / 0.1);
            --card-elev-shadow: var(--shadow-depth);
            /* Hero -> sticky: discrete UI motion (scroll-driven tuck avoids transition on transform/shadow). */
            --search-motion-duration: 0.28s;
            --search-motion-ease: cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-btn {
            background-color: hsl(var(--cta)) !important;
        }
        .search-btn:hover {
            background-color: color-mix(in hsl, hsl(var(--cta)), hsl(222 50% 8%) 14%) !important;
        }
        .search-bar {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: none;
            margin: 0;
            min-height: 0;
            gap: 12px;
            overflow: visible;
            border: none;
        }
        /* --search-tuck 0->1: scroll-smoothed shrink + transform (single bar in hero; no reparent). */
        #hero-search-bar.search-bar,
        .search-bar.search-bar--hero {
            width: min(100%, calc(60rem - 26rem * var(--search-tuck)), calc(100vw - 40px));
            max-width: none;
            flex: 0 1 auto;
            margin-left: auto;
            margin-right: auto;
            min-height: calc(3.375rem - 1.875rem * var(--search-tuck));
            height: auto;
            padding-top: calc(1.125rem - (1.125rem - 0.3125rem) * var(--search-tuck));
            padding-bottom: calc(1.125rem - (1.125rem - 0.3125rem) * var(--search-tuck));
            padding-left: calc(1.375rem - (1.375rem - 0.4375rem) * var(--search-tuck));
            padding-right: calc(1.375rem - (1.375rem - 0.4375rem) * var(--search-tuck));
            gap: calc(0.8125rem - (0.8125rem - 0.3125rem) * var(--search-tuck));
            font-size: calc(1rem - (1rem - 0.6875rem) * var(--search-tuck));
            background: linear-gradient(180deg, #ffffff 0%, rgb(252 252 253) 100%);
            border-radius: 9999px;
            border: 1px solid hsl(var(--border));
            box-shadow:
                0 1px 2px rgb(15 23 42 / 0.05),
                0 4px 16px rgb(15 23 42 / 0.08),
                0 14px 36px -10px rgb(15 23 42 / 0.12),
                0 calc(2px * var(--search-tuck)) calc(20px * var(--search-tuck)) rgb(15 23 42 / 0.09);
            /* Do not transition transform/box-shadow here: --search-tuck updates every frame while scrolling. */
            transition: border-color var(--search-motion-duration) var(--search-motion-ease);
        }
        #hero-search-bar.search-bar:focus-within,
        .search-bar.search-bar--hero:focus-within {
            border-color: color-mix(in hsl, hsl(var(--ring)) 38%, hsl(var(--border)) 62%);
            box-shadow:
                0 1px 3px rgb(15 23 42 / 0.08),
                0 8px 22px rgb(15 23 42 / 0.1),
                0 20px 48px -12px rgb(15 23 42 / 0.14),
                0 calc(2px * var(--search-tuck)) calc(26px * var(--search-tuck)) rgb(15 23 42 / 0.11);
            transition:
                border-color var(--search-motion-duration) var(--search-motion-ease),
                box-shadow var(--search-motion-duration) var(--search-motion-ease);
        }
        .hero-search-host #hero-search-bar.search-bar {
            position: relative;
            z-index: 3;
            margin-left: auto;
            margin-right: auto;
            transform: translateY(calc(-1 * var(--search-tuck) * var(--hero-search-sticky-lift)))

            transform-origin: center center;
            will-change: transform;
        }
        #hero-search-bar.search-bar .search-field {
            min-height: calc(56px - (56px - 28px) * var(--search-tuck));
            padding-left: calc(15px - (15px - 4px) * var(--search-tuck));
            padding-right: calc(15px - (15px - 4px) * var(--search-tuck));

        #hero-search-bar.search-bar .search-btn {

            width: 40px;
            min-width: 40px;

            flex: 0 0 auto;

        #hero-search-bar.search-bar .search-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;

        .search-field {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 46px;
            padding: 0 12px;
            position: relative;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s ease, box-shadow 0.15s ease;
        }
        .search-field:hover {
            box-shadow: var(--shadow-depth);
            background: hsl(var(--muted) / 0.35);
        }
        .search-field + .search-field::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 30px;
            background: hsl(var(--border));

        .search-field:hover + .search-field::before,
        .search-field:hover::before,
        .search-field:hover + .hero-location-query-wrap + .current-location-wrap > .search-field::before,
        .search-field:hover + .current-location-wrap > .search-field::before,
        .services-picker-wrap:has(.search-field:hover) + .hero-location-query-wrap + .current-location-wrap > .search-field::before,
        .services-picker-wrap:has(.search-field:hover) + .current-location-wrap > .search-field::before,

            background: transparent;
        }
        .search-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 46px;
            padding: 0 18px;
            border: none;
            border-radius: 999px;
            font-size: 0.8125rem;
            font-weight: 600;

        .search-btn:active {

        .search-field__label-stack {

        .search-field__text--sticky-compact {

            display: none !important;
        }
        .hero-search-host #hero-search-bar .search-field__text--sticky-full {

        }
        .current-location-wrap {

            align-items: stretch;
            gap: 8px;

        .hero-location-query-wrap + .current-location-wrap > .search-field::before,
        .current-location-wrap > .search-field::before {

            width: 1px;
            height: 30px;
            background: hsl(var(--border));
        }
        .current-location-wrap + .date-picker-wrap > .search-field::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 30px;
            background: hsl(var(--border));
        }
        .date-picker-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            position: relative;
            z-index: 20;
        }
        .date-picker-wrap > .search-field {
            width: 100%;
        }
        .search-field__icon {
            flex-shrink: 0;
            width: 15px;
            height: 15px;
            color: hsl(var(--muted-foreground));
        }
        .search-field__text {
            font-size: 0.8125rem;
            color: hsl(var(--muted-foreground));
            font-weight: 500;
            white-space: nowrap;
        }
        button.search-field {
            font: inherit;
            color: inherit;
            margin: 0;
            text-align: left;
            border: none;
            -moz-appearance: none;
            appearance: none;
            -webkit-appearance: none;
            width: auto;
            min-width: 0;
        }
        .hero-location-query-wrap {
            flex: 0 1 168px;
            min-width: 96px;
            max-width: 220px;
            display: flex;
            align-items: center;

            align-self: stretch;
        }
        .hero-location-query-wrap::before {
            content: "";
            position: absolute;

        a {
            color: inherit;
            text-decoration: none;
        }
        .category-shell {
            max-width: min(1680px, 100%);
            margin: 0 auto;
            padding: clamp(18px, 3vw, 28px) clamp(16px, 3vw, 32px) 56px;
        }
        .category-top {
            margin-bottom: clamp(18px, 2.5vw, 28px);

        .category-split {

        .category-controls {

            gap: 12px;

        .category-sort {

        .category-sort select {

            background: transparent;

            font-weight: 500;
            padding: 8px 12px;

        .category-clear-filters:hover {
            border-color: hsl(var(--primary) / 0.5);
            color: hsl(var(--primary));
            background: hsl(var(--primary) / 0.12);

            outline: 2px solid hsl(var(--ring));
            outline-offset: 1px;
        }
        @media (max-width: 860px) {
            .category-controls {
                flex-direction: column;
                align-items: stretch;

        }
        /* Listing grid: 2 columns beside the map (desktop); single column on small phones */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(18px, 2.2vw, 28px);
            padding: 8px 4px 2.5rem;

        }
        .category-result-feedback {

        .category-map {

<body>
    <main class="category-shell">
        <header class="category-top">
            <a href="./index.html" class="category-back">← Back to home</a>
            <h1 class="category-title" id="category-page-title">Category</h1>
            <div class="hero-search-host flex w-full justify-start" id="hero-search-host">
                <div id="hero-search-bar-anchor">
                    <div class="max-w-5xl mx-auto mt-6 px-4">
                    <form
                        id="hero-search-bar"
                        class="search-bar search-bar--hero flex items-center rounded-full bg-white shadow-sm w-full"
                        role="search"
                        aria-label="Find appointments"
                        onsubmit="event.preventDefault()"
                    >
                        <div class="hero-location-query-wrap">
                            <input
                                type="text"
                                id="hero-location-query"
                                class="hero-location-query"
                                placeholder="City or area"
                                aria-label="City or area"
                                autocomplete="address-level2"
                                maxlength="120"
                            />
                        </div>

                        <div class="current-location-wrap">
                            <button
                                type="button"
                                class="search-field"
                                id="current-location-btn"
                                aria-label="Filter businesses by your current city. Click again to show all."
                            >
                                <svg class="search-field__icon w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                <span class="search-field__label-stack">
                                    <span class="search-field__text search-field__text--sticky-full">Current location</span>
                                    <span class="search-field__text search-field__text--sticky-compact" aria-hidden="true">Location</span>
                                </span>
                            </button>
                            <div
                                class="location-preview-card rounded-2xl"
                                id="location-preview-card"
                                hidden
                                aria-live="polite"
                            >
                                <div class="location-preview-card__map">
                                    <div
                                        id="location-preview-map"
                                        role="img"
                                        aria-label="Map centered on your location"
                                    ></div>
                                </div>
                                <p class="location-preview-card__label" id="location-preview-label"></p>
                            </div>
                        </div>

                        <div class="date-picker-wrap">
                            <button
                                type="button"
                                class="search-field"
                                id="date-picker-btn"
                                aria-haspopup="dialog"
                                aria-expanded="false"
                                aria-controls="date-picker-dropdown"
                                aria-label="Choose appointment date. Any time."
                            >
                                <svg class="search-field__icon w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span class="search-field__label-stack">
                                    <span class="search-field__text search-field__text--sticky-full" id="date-picker-label-full">Any time</span>
                                    <span class="search-field__text search-field__text--sticky-compact" id="date-picker-label-compact" aria-hidden="true">Time</span>
                                </span>
                            </button>
                            <div
                                class="date-picker-dropdown"
                                id="date-picker-dropdown"
                                role="dialog"
                                aria-modal="false"
                                aria-label="Select a date"
                                hidden
                            >
                                <div class="date-picker__header">
                                    <button type="button" class="date-picker__nav" id="date-picker-prev" aria-label="Previous month">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                            <polyline points="15 18 9 12 15 6"></polyline>
                                        </svg>
                                    </button>
                                    <div class="date-picker__month-year">
                                        <label class="visually-hidden" for="date-picker-month">Month</label>
                                        <select id="date-picker-month" class="date-picker__select" aria-label="Month"></select>
                                        <label class="visually-hidden" for="date-picker-year">Year</label>
                                        <select id="date-picker-year" class="date-picker__select" aria-label="Year"></select>
                                    </div>
                                    <button type="button" class="date-picker__nav" id="date-picker-next" aria-label="Next month">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                            <polyline points="9 18 15 12 9 6"></polyline>
                                        </svg>
                                    </button>
                                </div>
                                <div class="date-picker__weekdays" aria-hidden="true">
                                    <span class="date-picker__weekday">Sun</span>
                                    <span class="date-picker__weekday">Mon</span>
                                    <span class="date-picker__weekday">Tue</span>
                                    <span class="date-picker__weekday">Wed</span>
                                    <span class="date-picker__weekday">Thu</span>
                                    <span class="date-picker__weekday">Fri</span>
                                    <span class="date-picker__weekday">Sat</span>
                                </div>
                                <div class="date-picker__grid" id="date-picker-grid" role="grid" aria-label="Days"></div>
                            </div>
                        </div>

                        <button
                            type="submit"
                            class="search-btn w-10 h-10 flex items-center justify-center rounded-full"
                            aria-label="Search"
                        >
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="11" cy="11" r="7"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <span class="visually-hidden">Search</span>
                        </button>
                    </form>
                    </div>
                </div>
            </div>
            <p id="category-page-empty" class="category-page-empty" hidden role="status"></p>
        </header>
        <section class="category-controls" aria-label="Sort and filters">
            <label class="category-sort">
                Sort
                <select id="category-sort">
                    <option value="top-rated">Top rated</option>
                    <option value="nearest">Nearest</option>
                    <option value="most-popular">Most popular</option>
                </select>
            </label>
            <div class="category-chip-row" role="group" aria-label="Quick filters">
                <button type="button" class="category-chip" data-chip-filter="distance-5">Within 5km</button>
                <button type="button" class="category-chip" data-chip-filter="distance-10">Within 10km</button>
                <button type="button" class="category-chip" data-chip-filter="distance-20">Within 20km</button>
                <button type="button" class="category-chip" data-chip-filter="rating-45">Rating 4.5+</button>
                <button type="button" class="category-chip" data-chip-filter="available-today">Available today</button>
                <button type="button" class="category-clear-filters" id="category-clear-filters" disabled>Clear filters</button>
            </div>
        </section>
        <div class="category-split">
            <div id="mainContent">
                <p id="category-result-feedback" class="category-result-feedback" aria-live="polite">0 results found</p>
                <div id="category-page-grid" class="category-grid qlist-trending-place-cards" aria-live="polite"></div>
            </div>
            <aside class="category-map" aria-label="Map of businesses in this category">
                <div
                    id="map"
                    class="category-map__canvas"
                    role="application"
                    aria-label="Map of listings in this category"
                ></div>
                <p id="category-page-map-caption" class="category-map__caption">Map</p>
            </aside>
        </div>
    </main>
    <script src="./qlist-auth-standalone.js"></script>
</body>
</html>
