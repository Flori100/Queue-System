<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="icon" href="./logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@600&display=swap"
        rel="stylesheet"
    />
    <style>
        body {
            box-sizing: border-box;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-sans);
            background: hsl(210 40% 98%);
            color: hsl(var(--primary, 222 50% 8%));
        }
        h1 {
            font-size: 1.125rem;
            font-weight: 500;
            text-align: center;
            padding: 2rem;
            max-width: 28rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1 id="q-settings-placeholder-title">Settings</h1>
    <script>
        (function () {
            var map = {
                account: "Account settings coming soon",
                password: "Change password settings coming soon",
                notifications: "Notifications settings coming soon",
                billing: "Billing settings coming soon"
            };
            var path = (location.pathname || "").replace(/\/$/, "");
            var seg = path.split("/").pop() || "";
            var el = document.getElementById("q-settings-placeholder-title");
            var msg = map[seg] || "Settings coming soon";
            if (el) el.textContent = msg;
            document.title = msg;
        })();
    </script>
</body>
</html>
