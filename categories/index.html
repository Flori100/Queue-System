<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@600&display=swap"

    />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font-sans);
            min-height: 100dvh;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            -webkit-font-smoothing: antialiased;
        }

        .categories-shell {
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: clamp(20px, 3vw, 32px) clamp(16px, 3vw, 24px) 56px;
        }

        .categories-back {
            display: inline-block;
            margin-bottom: 14px;
            font-size: 0.875rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            text-decoration: none;
        }

        .categories-back:hover {
            color: hsl(var(--foreground));
        }

        .section__head--categories {
            margin-bottom: 14px;
        }

        .section__title {
            font-size: clamp(1.125rem, 2vw, 1.375rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin: 0;
        }

        .home-category-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .home-category-grid > li {
            min-width: 0;
        }

        @media (min-width: 520px) {
            .home-category-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 16px;
            }
        }

        .home-category-grid-card {
            position: relative;
            display: block;
            width: 100%;
            padding: 0;
            border: none;
            border-radius: 14px;
            text-align: left;
            color: #fff;
            background: rgb(15 23 42);
            box-shadow:
                0 1px 2px rgb(15 23 42 / 0.06),
                0 4px 14px rgb(15 23 42 / 0.08);
            overflow: hidden;
            aspect-ratio: 5 / 3;
            max-height: 148px;
            transition:
                box-shadow 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @media (min-width: 520px) {
            .home-category-grid-card {
                max-height: 132px;
            }
        }

        button.home-category-grid-card {
            cursor: pointer;
            font: inherit;
            appearance: none;
        }

        .home-category-grid-card__media {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .home-category-grid-card__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.001);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .home-category-grid-card__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgb(15 23 42 / 0.2) 0%,
                rgb(15 23 42 / 0.35) 38%,
                rgb(15 23 42 / 0.78) 100%
            );
            transition: background 0.28s ease;
        }

        .home-category-grid-card__content {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            padding: 10px 12px 11px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-shadow: 0 1px 10px rgb(0 0 0 / 0.35);
        }

        .home-category-grid-card__label {
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: #fff;
        }

        .home-category-grid-card__hint {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            line-height: 1.25;
            color: rgb(255 255 255 / 0.88);
        }

        @media (hover: hover) and (pointer: fine) {
            .home-category-grid-card:hover {
                transform: translateY(-4px);
                box-shadow:
                    0 4px 8px rgb(15 23 42 / 0.08),
                    0 18px 40px rgb(15 23 42 / 0.2);
            }

            .home-category-grid-card:hover .home-category-grid-card__img {
                transform: scale(1.07);
            }

            .home-category-grid-card:hover .home-category-grid-card__overlay {
                background: linear-gradient(
                    180deg,
                    rgb(15 23 42 / 0.28) 0%,
                    rgb(15 23 42 / 0.42) 38%,
                    rgb(15 23 42 / 0.84) 100%
                );
            }
        }

        .home-category-grid-card:active {
            transform: translateY(-1px);
            box-shadow:
                0 2px 4px rgb(15 23 42 / 0.1),
                0 10px 22px rgb(15 23 42 / 0.16);
        }

        .home-category-grid-card:focus-visible {
            outline: 2px solid hsl(var(--primary));
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            .home-category-grid-card,
            .home-category-grid-card__img,
            .home-category-grid-card__overlay {
                transition: none !important;
            }
        }
    </style>
</head>
