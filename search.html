<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Search results for a category on QList." />
    <title>Search results – QList</title>
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@600&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="./tokens.css" />
    <link rel="stylesheet" href="./src/globals.css" />
    <script>
        (function () {
            try {
                document.documentElement.classList.remove("dark");
                document.documentElement.setAttribute("data-theme", "light");
            } catch (e) {}
        })();
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            background-color: hsl(var(--background));
            color-scheme: light;
        }
        body {
            font-family: var(--font-sans);
            min-height: 100dvh;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            -webkit-font-smoothing: antialiased;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        .category-shell {
            max-width: min(1680px, 100%);
            margin: 0 auto;
            padding: clamp(18px, 3vw, 28px) clamp(16px, 3vw, 32px) 56px;
        }
        .category-top {
            margin-bottom: clamp(18px, 2.5vw, 28px);
        }
        .category-back {
            display: inline-block;
            font-size: 0.875rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            margin-bottom: 10px;
        }
        .category-back:hover {
            color: hsl(var(--foreground));
        }
        .category-title {
            font-size: clamp(1.35rem, 2.8vw, 1.75rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }
        .category-split {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(340px, 42vw);
            gap: clamp(20px, 2.5vw, 36px);
            align-items: start;
        }
        @media (max-width: 900px) {
            .category-split {
                grid-template-columns: 1fr;
            }
        }
        .category-page-empty {
            margin-top: 12px;
            font-size: 0.9375rem;
            color: hsl(var(--muted-foreground));
            max-width: 42ch;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(18px, 2.2vw, 28px);
            padding: 8px 4px 2.5rem;
            align-items: start;
            min-width: 0;
        }
        @media (max-width: 520px) {
            .category-grid {
                grid-template-columns: 1fr;
            }
        }
        .category-map {
            border-radius: 16px;
            border: 1px solid hsl(var(--border) / 0.55);
            background: linear-gradient(
                160deg,
                hsl(var(--muted) / 0.28) 0%,
                hsl(var(--card)) 55%,
                hsl(var(--muted) / 0.2) 100%
            );
            min-height: min(52dvh, 420px);
            overflow: hidden;
            position: relative;
            box-shadow: 0 1px 2px rgb(0 0 0 / 0.04);
        }
        @media (min-width: 901px) {
            .category-map {
                position: sticky;
                top: 100px;
                align-self: start;
                height: 80vh;
                min-height: 80vh;
            }
        }
        .category-map__canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: inherit;
        }
        .category-map__canvas[hidden] {
            display: none !important;
        }
        .leaflet-container {
            font-family: inherit;
            border-radius: inherit;
        }
        .qlist-map-marker {
            background: transparent !important;
            border: none !important;
        }
        .qlist-map-marker .qlist-map-pin-inner {
            width: 14px;
            height: 14px;
            margin: 0 auto;
            border-radius: 50%;
            background: linear-gradient(160deg, #1e293b, #0f172a);
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.22);
            transform-origin: center center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .qlist-map-marker:hover .qlist-map-pin-inner,
        .qlist-map-marker.qlist-map-marker--highlight .qlist-map-pin-inner {
            transform: scale(1.14);
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.3);
        }
        .category-map__caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1100;
            padding: 12px 14px;
            font-size: 0.8125rem;
            color: hsl(var(--muted-foreground));
            pointer-events: none;
            background: linear-gradient(transparent, hsl(var(--card) / 0.94));
        }
    </style>
</head>
<body class="qlist-search-results">
    <main class="category-shell">
        <header class="category-top">
            <a href="./index.html" class="category-back">← Back to home</a>
            <h1 class="category-title" id="category-page-title">Search results</h1>
            <p id="category-page-empty" class="category-page-empty" hidden role="status"></p>
        </header>
        <div class="category-split">
            <div id="category-page-grid" class="category-grid qlist-trending-place-cards" aria-live="polite"></div>
            <aside class="category-map" aria-label="Map of businesses in this category">
                <div
                    id="map"
                    class="category-map__canvas"
                    role="application"
                    aria-label="Map of listings in this category"
                ></div>
                <p id="category-page-map-caption" class="category-map__caption">Map</p>
            </aside>
        </div>
    </main>
    <script type="module" src="./src/categoryPage.js"></script>
</body>
</html>
